name: Deploy tests

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Tests:
    uses: ./.github/workflows/testing.yml
    with:
      os_list: '["ubuntu-latest"]'
      python_list: '["3.13"]'
