name: Daily tests

on:
  schedule:
    - cron: '0 12 * * *'  # 7 am EST every day
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  DailyTests:
    uses: ./.github/workflows/testing.yml
    with:
      os_list: '["ubuntu-latest"]'
      python_list: '["3.11","3.12","3.13","3.14"]'

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ DailyTests ]
    if: ${{ always() && needs.DailyTests.result == 'failure' }}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Compute (Code) Daily Tests"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Compute <dandi-compute@users.noreply.github.com>
          body: "The daily test workflow failed, please check status at https://github.com/dandi-compute/code/actions/workflows/daily_tests.yml"
